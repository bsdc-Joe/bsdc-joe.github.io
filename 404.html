<!doctype html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | Joseph Rolfe</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230b0f14'/><text y='68' x='50' text-anchor='middle' font-size='42' font-family='system-ui,sans-serif' font-weight='700' fill='%23ff6a3d'>JR</text></svg>" />
  <link rel="stylesheet" href="./styles.css">
  <script defer src="./script.js"></script>
  <style>
    html, body { min-height: 100%; }
    body { background: var(--bg2); }
    .not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 64px);
      text-align: center;
      padding: 48px 24px;
    }
    .not-found-code {
      font-size: clamp(80px, 18vw, 140px);
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      opacity: 0.15;
      letter-spacing: -4px;
      margin-bottom: 0;
    }
    .not-found-title {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      margin-top: -8px;
      margin-bottom: 12px;
    }
    .not-found-sub {
      color: var(--muted);
      font-size: 15px;
      max-width: 380px;
      margin-bottom: 32px;
    }
    .not-found-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>

<body>
  <!-- Nav -->
  <header class="header">
    <div class="container nav">
      <a class="brand" href="./index.html">[JR]</a>

      <nav class="nav-links" aria-label="Primary">
        <a href="./index.html#about">About</a>
        <a href="./index.html#projects">Projects</a>
        <a href="./index.html#skills">Skills</a>
        <a href="./experience.html">Experience</a>
        <a href="./index.html#education">Education</a>
        <a href="./certifications.html">Certs</a>
        <a href="./index.html#contact">Contact</a>
        <span class="nav-indicator" aria-hidden="true"></span>
      </nav>

      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
        <span class="icon" data-icon="sun">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12Z"></path>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
          </svg>
        </span>
        <span class="icon" data-icon="moon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"></path>
          </svg>
        </span>
      </button>

      <button class="icon-btn nav-burger" id="burger" aria-label="Open menu">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>

    <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
      <div class="container mobile-links">
        <a href="./index.html#about">About</a>
        <a href="./index.html#projects">Projects</a>
        <a href="./index.html#skills">Skills</a>
        <a href="./experience.html">Experience</a>
        <a href="./index.html#education">Education</a>
        <a href="./certifications.html">Certs</a>
        <a href="./index.html#contact">Contact</a>
      </div>
    </div>
  </header>

  <div class="not-found">
    <div class="not-found-code">404</div>
    <h1 class="not-found-title">Page not found</h1>
    <p class="not-found-sub">Looks like this page doesn't exist. It may have been moved or the URL might be wrong.</p>
    <div class="not-found-actions">
      <a href="./index.html" class="btn">← Back to Portfolio</a>
      <a href="./index.html#contact" class="btn secondary">Contact Me</a>
    </div>
  </div>

  <button id="backToTop" aria-label="Back to top" title="Back to top">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>
</body>
</html>
